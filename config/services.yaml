services:
    _defaults:
        autowire: true
        autoconfigure: true

    Rzessack\HealthMonitor\Service\ProcReader: ~

    Rzessack\HealthMonitor\Service\SystemHealthService:
        arguments:
            $redisUrl: '%env(default::string:REDIS_URL)%'

    Rzessack\HealthMonitor\Repository\SystemHealthSnapshotRepository:
        arguments:
            $timezone: '%health_monitor.timezone%'

    Rzessack\HealthMonitor\Command\CollectHealthSnapshotCommand:
        arguments:
            $timezone: '%health_monitor.timezone%'
            $retentionDays: '%health_monitor.retention_days%'
        tags: ['console.command']
